<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utils.css">
</head>
<body>
    <div class="nav">
        <h1 class="nav-intro">Welcome to my Calculator!</h1>
    </div>
    <div class="container toCentre ">
       <div class="container-row">
        <input class="container-input js-input-show" type="text">
       </div>
       <div class="container-row">
           <button class="key-button buttons">C</button>
           <button class="key-button buttons">+/-</button>
           <button class="key-button buttons">%</button>
           <button class="key-button buttons">X</button>
        </div>
        <div class="container-row">
           <button class="key-button buttons">7</button>
           <button class="key-button buttons">8</button>
           <button class="key-button buttons">9</button>
           <button class="key-button buttons">=</button>
        </div>
        <div class="container-row">
           <button class="key-button buttons">4</button>
           <button class="key-button buttons">5</button>
           <button class="key-button buttons">6</button>
           <button class="key-button buttons">-</button>
        </div>
        <div class="container-row">
           <button class="key-button buttons">1</button>
           <button class="key-button buttons">2</button>
           <button class="key-button buttons">3</button>
           <button class="key-button buttons">+</button>
        </div>
        <div class="container-row">
           <button class="key-button buttons">.</button>
           <button class="key-button buttons">0</button>
           <button class="key-button buttons">*</button>
           <button class="key-button buttons">/</button>
    </div>
      </div>



      <script type="module" src="script.js"></script>
</body>
</html>
